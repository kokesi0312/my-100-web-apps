<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Web Apps Challenge</title>
    <meta name="description" content="100日間で100個のウェブアプリを作成するチャレンジのポータルサイトです。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 背景のエフェクト -->
    <div class="background-animation"></div>
    <div class="glow-orb top-left"></div>
    <div class="glow-orb bottom-right"></div>

    <div class="container">
        <!-- ヒーローセクション -->
        <header class="hero-section">
            <h1 class="title-glow">100 Web Apps Challenge</h1>
            <p class="subtitle">100日間で100個のウェブアプリを開発するプロジェクト</p>

            <div class="progress-wrapper">
                <div class="progress-info">
                    <span class="progress-label">Challenge Progress</span>
                    <span class="progress-text"><span id="progress-count">0</span> / 100</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <!-- ピックアップ（最新アプリ）セクション -->
        <section class="pickup-section" id="pickup-section">
            <h2 class="section-title">Latest Project</h2>
            <!-- JavaScriptで動的に最新アプリを表示 -->
            <div id="pickup-card-container"></div>
        </section>

        <!-- アーカイブ（全アプリー覧）セクション -->
        <section class="archive-section">
            <h2 class="section-title">Archive</h2>
            <div class="grid-container" id="app-grid">
                <!-- JavaScriptで動的に100個のアイテムを生成 -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
